name: Sync match scores

on:
  schedule:
    # Every 15 minutes during the tournament (UTC).
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull scores from ESPN
        run: npm run sync

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet; then
            echo "No score changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json index.html
          git commit -m "Sync World Cup scores from ESPN"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping deploy (push still updated GitHub)."
            exit 0
          fi
          npx wrangler@4 pages deploy . --project-name=fifa-match-calendar --branch=main